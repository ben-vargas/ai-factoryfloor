{{ define "content" }}
{{ partial "nav.html" . }}

<section class="min-h-screen flex flex-col pt-20 pb-16">
  <div class="max-w-[700px] mx-auto px-8">
    <h1 class="font-mono text-3xl font-bold mb-8">{{ .Title }}</h1>

    <div class="prose prose-invert prose-sm max-w-none
      [&_h2]:font-mono [&_h2]:text-lg [&_h2]:font-semibold [&_h2]:mt-8 [&_h2]:mb-4
      [&_h3]:font-mono [&_h3]:text-base [&_h3]:font-semibold [&_h3]:mt-6 [&_h3]:mb-3
      [&_p]:text-fg-muted [&_p]:leading-relaxed [&_p]:mb-4
      [&_ul]:text-fg-muted [&_ul]:mb-4 [&_ul]:pl-6 [&_ul]:list-disc
      [&_li]:mb-1
      [&_a]:text-wine-light [&_a]:hover:underline
      [&_strong]:text-fg">
      {{ .Content }}
    </div>

    <p class="text-fg-muted text-xs mt-12">
      Last updated: {{ .Date.Format "January 2, 2006" }}
    </p>
  </div>
</section>

{{ partial "footer.html" . }}
{{ end }}
