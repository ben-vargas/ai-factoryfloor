<!DOCTYPE html>
<html lang="en" class="scroll-smooth dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ .Title }} - {{ .Site.Title }}</title>
<meta name="description" content="{{ .Site.Params.description }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
{{ $css := resources.Get "css/style.css" }}
{{ if $css }}
<link href="{{ $css.RelPermalink }}?v={{ $css.Content | md5 }}" rel="stylesheet">
{{ end }}
<script>
(function(){
  var t = localStorage.getItem('ff-theme');
  if (t === 'light') { document.documentElement.classList.remove('dark'); document.documentElement.classList.add('light'); }
  else if (t === 'system' || !t) {
    if (!window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.classList.remove('dark'); document.documentElement.classList.add('light');
    }
  }
})();
</script>
</head>
<body class="font-sans antialiased overflow-x-hidden bg-bg text-fg transition-colors duration-300">
{{ block "content" . }}{{ end }}

<script>
(function() {
  var themes = ['dark', 'light', 'system'];
  var toggle = document.getElementById('theme-toggle');
  var html = document.documentElement;

  function getSystemTheme() {
    return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  }

  function applyTheme(pref) {
    var effective = pref === 'system' ? getSystemTheme() : pref;
    html.className = html.className.replace(/\b(dark|light)\b/g, '').trim();
    html.classList.add(effective);
    html.setAttribute('data-pref', pref);
    toggle.querySelectorAll('svg').forEach(function(s) { s.classList.add('hidden'); });
    if (pref === 'light') toggle.querySelector('.icon-sun').classList.remove('hidden');
    else if (pref === 'dark') toggle.querySelector('.icon-moon').classList.remove('hidden');
    else toggle.querySelector('.icon-system').classList.remove('hidden');
  }

  applyTheme(localStorage.getItem('ff-theme') || 'dark');

  toggle.addEventListener('click', function() {
    var current = html.getAttribute('data-pref') || 'dark';
    var next = themes[(themes.indexOf(current) + 1) % themes.length];
    localStorage.setItem('ff-theme', next);
    applyTheme(next);
  });

  window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', function() {
    if (html.getAttribute('data-pref') === 'system') applyTheme('system');
  });
})();

var observer = new IntersectionObserver(function(entries) {
  entries.forEach(function(entry) {
    if (entry.isIntersecting) entry.target.classList.add('visible');
  });
}, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
document.querySelectorAll('.reveal').forEach(function(el) { observer.observe(el); });
</script>
</body>
</html>
